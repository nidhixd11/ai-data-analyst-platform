version: "3.9"

# Local development only.
# Production: backend → Render, frontend → Vercel (static), ollama → local dev only.
# Frontend excluded from compose: Vite HMR is faster on bare metal than in Docker.
# Run frontend separately: cd frontend && npm run dev → http://localhost:5173

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - EMBEDDER_BACKEND=local
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    # Local LLM — dev only. Not deployed to Render (free tier has insufficient RAM).
    # In production, Groq (primary) and Gemini (fallback) replace this.
    # First-time setup: docker exec chatbot_ollama ollama pull llama3.2
    image: ollama/ollama:latest
    container_name: chatbot_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    restart: unless-stopped

  redis:
    # Phase 1: stubbed — REDIS_URL is wired but not actively used.
    # Phase 2: hot-query cache + rate limiting + Celery broker (T-146).
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
  # postgres:
  #   Phase 2 only — uncomment when Phase 2 begins (T-146+).
  #   Render provides a free managed PostgreSQL 16 instance.
  #   pgvector extension replaces in-memory FAISS for embeddings.
  #   image: pgvector/pgvector:pg16
  #   container_name: chatbot_postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-chatbot}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_dev}
  #     POSTGRES_DB: ${POSTGRES_DB:-chatbot_db}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  ollama_data: # model weights — not wiped on docker compose down
  redis_data:
  uploads_data:
    # uploaded CSV/Excel files — persists across container restarts
    # postgres_data:  # Phase 2

networks:
  app-network:
    driver: bridge
    # backend → ollama : http://ollama:11434
    # backend → redis  : redis://redis:6379
    # browser → backend: http://localhost:8000  (exposed port)
