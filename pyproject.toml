# Python project configuration for ai-data-analyst-platform.
# Black, ruff, and mypy all read settings from this file.
# Eventually backend dependencies will also be declared here (Phase 2).

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.venv
  | \.git
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
# Rule sets:
# E/W = pycodestyle errors/warnings
# F   = pyflakes (unused imports, undefined names)
# I   = isort (import ordering)
# B   = flake8-bugbear (likely bugs)
# UP  = pyupgrade (modernize syntax)
# SIM = flake8-simplify
# C4  = flake8-comprehensions
select = ["E", "W", "F", "I", "B", "UP", "SIM", "C4"]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in argument defaults — FastAPI uses Depends() this way
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["B011"]  # asserts are fine in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
no_strict_optional = true
# Strict-ish but not annoying. We can tighten in Phase 2.
disallow_untyped_defs = false
check_untyped_defs = true
files = ["backend"]
exclude = ["\\.venv", "build", "dist"]
